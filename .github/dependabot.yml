version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(ci)

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: terraform
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)
